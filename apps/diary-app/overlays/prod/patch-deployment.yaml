apiVersion: apps/v1
kind: Deployment
metadata:
  name: diary-app
  namespace: diary-app-prod
spec:
  replicas: 2 # prod는 고가용성 2개 유지
  template:
    spec:
      containers:
        - name: diary-app
          image: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team4-backend-api:1fba1121d76811c3f11a30914a256a56928e10f2
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
